name: Tests & Verification Gate

on:
  push:
    branches: [ main, develop, smritiNX ]
  pull_request:
    branches: [ main, develop, smritiNX ]

jobs:
  frontend-verification:
    name: Frontend (Node/TypeScript) Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Code Formatting Check
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}" || echo "Formatting issues detected"

      - name: Run Linter & Type Check
        run: npm run lint

      - name: Run Frontend Tests
        run: npm test

  backend-verification:
    name: Backend (FastAPI/Python) Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: smriti_retail_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/production.txt
            backend/dev.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/dev.txt ]; then pip install -r backend/dev.txt; fi

      - name: Run Alembic Database Migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/smriti_retail_db
        run: alembic upgrade head

      - name: Run Type Checker (MyPy)
        working-directory: backend
        run: python -m mypy app/ | python -m mypy_baseline filter

      - name: Run Pytest Suite (Unit & Integration)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/smriti_retail_db
          JWT_SECRET_KEY: ci_test_secret_do_not_use_in_prod
          SGIP_VAULT_MASTER_KEY: ci_vault_master_key_do_not_use_in_prod
          INTERNAL_SERVICE_KEY: ci_internal_service_key_do_not_use_in_prod
        run: pytest -v
