name: Docker Build & Compose Verify

on:
  push:
    branches: [ main, develop, smritiNX ]
  pull_request:
    branches: [ main, develop, smritiNX ]

jobs:
  docker-validation:
    name: Docker Setup Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Validate Docker Compose Configurations
        run: |
          docker compose -f docker-compose.yml config > /dev/null
          echo "docker-compose.yml config validated successfully."

      - name: Verify Frontend Container Build
        run: docker build -t smriti-frontend:test -f Dockerfile .

      - name: Verify Backend Container Build
        run: docker build -t smriti-backend:test -f backend/Dockerfile backend/
