name: Security & Vulnerability Scan

on:
  push:
    branches: [ main, develop, smritiNX ]
  pull_request:
    branches: [ main, develop, smritiNX ]

jobs:
  secrets-scan:
    name: Secrets & Credential Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Audit Tooling
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          if [ -f backend/requirements.txt ]; then pip-audit -r backend/requirements.txt; fi
          if [ -f backend/dev.txt ]; then pip-audit -r backend/dev.txt; fi

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run npm audit
        run: npm audit --audit-level=high

  static-analysis:
    name: Static Application Security Testing (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (Python Security Linter)
        working-directory: backend
        run: bandit -r app/ -ll

  container-security:
    name: Docker Image Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Local Image for Backend
        run: docker build -t smriti-backend:latest -f backend/Dockerfile backend/

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'smriti-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
