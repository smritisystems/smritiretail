name: SMRITI CI

on:
  push:
    branches: [ main, developer ]
  pull_request:
    branches: [ main, developer ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: smriti_retail_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Node Dependencies
        run: npm ci

      - name: Run TypeScript Linter Check
        run: npm run lint

      - name: Run Node Test Suite
        run: npm test

      - name: Install Python Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/dev.txt ]; then pip install -r backend/dev.txt; fi

      - name: Run Alembic Migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/smriti_retail_db
        run: alembic upgrade head

      - name: Run MyPy Type Check with Baseline
        working-directory: backend
        run: python -m mypy app/ | python -m mypy_baseline filter

      - name: Run Python Backend Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/smriti_retail_db
          JWT_SECRET_KEY: ci_test_secret_do_not_use_in_prod
          SGIP_VAULT_MASTER_KEY: ci_vault_master_key_do_not_use_in_prod
        run: pytest -v
