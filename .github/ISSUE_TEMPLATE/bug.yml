name: Bug Report
description: Report a bug in SMRITI Retail OS
title: "[BUG]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below.
  - type: input
    id: version
    attributes:
      label: SMRITI Version
      placeholder: e.g. 3.16.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: Provide a clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected vs Actual Behavior
      placeholder: What did you expect to happen, and what actually happened?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment Details
      placeholder: e.g., Browser (Chrome 122), OS (Windows 11), Node v20
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      placeholder: Paste terminal outputs, API error responses, or logs here.
