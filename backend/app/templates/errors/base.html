<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SMRITI Retail OS - System Error{% endblock %}</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Tailwind CSS (loaded via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        .glow-border {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        body {
            background-color: #0B0F19;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 41, 59, 0.3) 0, transparent 50%),
                radial-gradient(at 50% 0%, rgba(59, 130, 246, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.05) 0, transparent 50%);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col font-sans selection:bg-blue-600 selection:text-white">
    <!-- Header / Branding -->
    <header class="w-full max-w-7xl mx-auto px-6 py-6 flex items-center justify-between border-b border-slate-800/80">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-violet-600 flex items-center justify-center font-display font-bold text-xl text-white shadow-lg shadow-blue-500/20">S</div>
            <div>
                <span class="font-display font-bold text-lg tracking-tight bg-gradient-to-r from-blue-400 to-violet-400 bg-clip-text text-transparent">SMRITI Retail OS</span>
                <span class="block text-xs text-slate-500 font-medium font-mono uppercase tracking-wider">Enterprise Core</span>
            </div>
        </div>
        <div class="flex items-center gap-4 text-xs font-mono">
            <span class="px-2.5 py-1 rounded-full bg-slate-900 border border-slate-800 text-slate-400">v3.16.0</span>
            {% if env == 'production' %}
                <span class="px-2.5 py-1 rounded-full bg-emerald-950/40 border border-emerald-800/50 text-emerald-400">PROD</span>
            {% else %}
                <span class="px-2.5 py-1 rounded-full bg-amber-950/40 border border-amber-800/50 text-amber-400">DEV</span>
            {% endif %}
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="w-full max-w-7xl mx-auto px-6 py-6 border-t border-slate-800/80 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-slate-500 font-medium">
        <div>
            &copy; 2026 <a href="https://smritibooks.com" class="hover:text-blue-400 transition-colors">SMRITIBooks.com</a>. All Rights Reserved.
        </div>
        <div class="flex gap-6">
            <a href="/docs" class="hover:text-slate-300 transition-colors">Swagger UI</a>
            <a href="/redoc" class="hover:text-slate-300 transition-colors">ReDoc</a>
            <a href="/health" class="hover:text-slate-300 transition-colors">Health Diagnostics</a>
        </div>
    </footer>
</body>
</html>
