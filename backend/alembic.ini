[alembic]
script_location = alembic
# NOTE: alembic/env.py overrides this URL at runtime using settings.DATABASE_URL
# from app/core/config.py (reads DATABASE_URL env var). This value is NEVER used
# directly — it is present only because alembic requires a sqlalchemy.url key.
# Never commit real credentials here.
sqlalchemy.url = postgresql+asyncpg://%(DATABASE_USER)s:%(DATABASE_PASS)s@%(DATABASE_HOST)s:5432/%(DATABASE_NAME)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
